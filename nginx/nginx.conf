# ═══════════════════════════════════════════════════════════════
# Antigravity Forensics — Nginx Reverse Proxy Configuration
# ═══════════════════════════════════════════════════════════════
# Serves the React frontend and proxies /api → backend:8001

# ── Upstream ─────────────────────────────────────────────────
upstream backend {
    server backend:8001;
}

server {
    listen 80;
    server_name _;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://backend:8001 ws:;" always;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Request Limits ───────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── API Proxy (/api/* → backend) ─────────────────────────
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering for real-time responses
        proxy_buffering off;
    }

    # ── Health proxy (direct, no /api prefix) ────────────────
    location = /api/health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Frontend Static Files ────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: all routes → index.html
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Disable access to hidden files ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
